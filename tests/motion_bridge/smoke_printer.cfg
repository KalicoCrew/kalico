# Minimal printer.cfg for Phase 1 Renode H723 smoke test.
#
# Derived from the user's Trident config, stripped to the minimum needed
# for klippy boot verification. Uses pins compatible with the Renode H743
# platform description (which the H723 sim reuses).
#
# USART2 (PA2/PA3) is reserved for the serial connection; all other pins
# are chosen from gpioPortA, gpioPortB, gpioPortC, gpioPortD, gpioPortE
# to avoid conflicts.
#
# Phase 1 scope: single motion MCU via Renode. No bottom/beacon/NIS MCUs.

[mcu]
serial: socket://localhost:3334

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000

[stepper_x]
step_pin: PE0
dir_pin: PE1
enable_pin: !PE2
microsteps: 16
rotation_distance: 40
endstop_pin: PE3
position_endstop: 0
position_max: 350

[stepper_y]
step_pin: PE4
dir_pin: PE5
enable_pin: !PE6
microsteps: 16
rotation_distance: 40
endstop_pin: PE7
position_endstop: 0
position_max: 350

[stepper_z]
step_pin: PD0
dir_pin: PD1
enable_pin: !PD2
microsteps: 16
rotation_distance: 8
endstop_pin: PD3
position_endstop: 0
position_max: 400

[extruder]
step_pin: PD4
dir_pin: PD5
enable_pin: !PD6
microsteps: 16
rotation_distance: 5.7
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PD7
sensor_type: Generic 3950
sensor_pin: PC0
min_temp: 0
max_temp: 300
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114

[heater_bed]
heater_pin: PD8
sensor_type: Generic 3950
sensor_pin: PC1
min_temp: 0
max_temp: 130
control: pid
pid_Kp: 56.0
pid_Ki: 0.83
pid_Kd: 60

[fan]
pin: PD9

[input_shaper]
shaper_freq_x: 50
shaper_freq_y: 45
shaper_type: mzv
