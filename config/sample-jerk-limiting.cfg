# Jerk-limited motion with a per-ramp notch law
#
# This renders each move's acceleration as a continuous jerk-limited ramp
# instead of a hard step, and can park the ramp's shaper zero on a fixed
# structural resonance so that mode is not excited. See docs/Jerk_Limiting.md.
#
# Add these options to the [printer] section. All are opt-in: with
# unified_planner off (the default) motion is unchanged.

#[printer]
#unified_planner: True
#   Enable jerk-limited motion. Off by default.
#
#unified_notch_freq: 0
#   Park the accel-ramp's shaper zero on this mode frequency (Hz), using the
#   per-ramp law J = dv * f_n^2. A jerk-limited accel pulse is triangular, i.e.
#   an input shaper with a zero at 1/T_rise; this pins T_rise = 1/f_n so the
#   zero stays on a fixed physical mode regardless of the move's velocity
#   change. Peak acceleration then self-scales as a_peak = dv * f_n, so
#   max_accel stops governing ordinary moves and only backstops moves too short
#   to shape. Find the value with a TUNING_TOWER sweep of notch_freq against a
#   ringing/ghosting test. 0 = off (use the fixed jerk below).
#
#unified_max_jerk: 0
#   Fixed jerk cap (mm/s^3). 0 = uncapped. When unified_notch_freq is set this
#   becomes a CEILING on the per-ramp jerk (clamping it only lengthens the ramp,
#   i.e. moves the zero below f_n -- always safe), not the jerk itself.
#
#unified_jerk_dt: 0.001
#   Integration time step (s) for the emitted ramp. Smaller = smoother ramp and
#   more motion-queue entries; the default is a good balance.

# Live tuning (no restart), e.g. for a TUNING_TOWER sweep:
#   SET_UNIFIED ENABLE=1 NOTCH_FREQ=55
#   SET_UNIFIED                       # report current state
#
# Example TUNING_TOWER to find the mode frequency (park zero, print a ringing
# tower, read the cleanest band's Z height back to a frequency):
#   TUNING_TOWER COMMAND=SET_UNIFIED PARAMETER=notch_freq \
#       START=30 STEP_DELTA=4 STEP_HEIGHT=5 SKIP=2
#
# NOTE: with a notch frequency set, keep max_accel at the machine's real
# torque limit -- it backstops moves too short to shape. The notch keeps
# ordinary moves well under it (a_peak = dv * f_n).
