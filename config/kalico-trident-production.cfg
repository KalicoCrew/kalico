# Kalico Trident production config — Octopus Pro H723 (MCU1) + F446 (MCU2)
#
# Phase 2a scope: H723 MCU only, XY travel moves through the kalico bridge.
# Phase 3 adds the [mcu bottom] block and Z steppers below.
#
# Hardware assumptions (verify before first power-on):
#   - Octopus Pro v1.1 with STM32H723 @ 520 MHz
#   - Driver0: B-motor (right belt) via TMC5160 SPI
#   - Driver1: A-motor (left belt) via TMC5160 SPI
#   - If 4 TMC5160 for AB (dual-motor-per-belt), uncomment Driver2/Driver3 blocks below
#   - Driver4: Extruder via TMC5160 SPI (not active until Step 9 / Phase 4)
#   - TMC5160 SPI: shared SCK/MISO/MOSI on PA5/PA6/PA7, CS per driver below
#   - Resonance: X=189.6 Hz, Y=118.8 Hz (measured via Beacon on this Trident)
#   - Machine: 350 mm Trident, belt pitch 2mm, 20T pulleys → rotation_distance=40

# ---------------------------------------------------------------------------
# MCU1 — Octopus Pro H723 (AB steppers + extruder)
# ---------------------------------------------------------------------------

[mcu]
# USB-CDC serial. Run: ls /dev/serial/by-id/  to find the exact path after flashing.
# Example: /dev/serial/by-id/usb-Klipper_stm32h723xx_XXXXXX-if00
serial: /dev/serial/by-id/usb-Klipper_stm32h723xx_490017000851323235363233-if00
restart_method: command

# ---------------------------------------------------------------------------
# MCU2 — Octopus F446 (Z steppers) — PHASE 3 ONLY, comment out until then
# ---------------------------------------------------------------------------

#[mcu bottom]
#serial: /dev/serial/by-id/usb-Klipper_stm32f446xx_REPLACE_WITH_YOUR_ID-if00
#restart_method: command

# ---------------------------------------------------------------------------
# Printer
# ---------------------------------------------------------------------------

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 5000
# Conservative initial accel. Raise toward 65000 after first-print validation.
max_z_velocity: 15
max_z_accel: 150
square_corner_velocity: 5.0

# ---------------------------------------------------------------------------
# Input shaper — baked into trajectory at planning time
# ---------------------------------------------------------------------------

[input_shaper]
shaper_type_x: smooth_mzv
shaper_freq_x: 189.6
shaper_type_y: smooth_mzv
shaper_freq_y: 118.8

# ---------------------------------------------------------------------------
# Idle timeout — prevent motor disable during bench testing sessions
# ---------------------------------------------------------------------------

[idle_timeout]
timeout: 1800

# ---------------------------------------------------------------------------
# Stepper X — Driver0 (B motor, right belt)
# ---------------------------------------------------------------------------

[stepper_x]
step_pin: PF13
dir_pin: PF12
enable_pin: !PF14
microsteps: 16
rotation_distance: 40
# X endstop: PG6 on Octopus Pro v1.1 Driver0 diag pin.
# Change to probe: pin if using sensorless homing.
endstop_pin: PG6
position_endstop: 0
position_min: 0
position_max: 350
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5

[tmc5160 stepper_x]
cs_pin: PC4
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 1.4
hold_current: 0.7
# Sense resistor on Octopus Pro 5160 socket: 0.075 Ω (verify on your board)
sense_resistor: 0.075
stealthchop_threshold: 0

# ---------------------------------------------------------------------------
# Stepper Y — Driver1 (A motor, left belt)
# ---------------------------------------------------------------------------

[stepper_y]
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
microsteps: 16
rotation_distance: 40
endstop_pin: PG9
position_endstop: 350
position_min: 0
position_max: 350
homing_speed: 80
second_homing_speed: 20
homing_retract_dist: 5

[tmc5160 stepper_y]
cs_pin: PD11
spi_software_miso_pin: PA6
spi_software_mosi_pin: PA7
spi_software_sclk_pin: PA5
run_current: 1.4
hold_current: 0.7
sense_resistor: 0.075
stealthchop_threshold: 0

