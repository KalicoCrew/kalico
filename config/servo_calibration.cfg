# Servo calibration macro toolkit (A6-EC over EtherCAT).
#
# Usage: copy next to printer.cfg and add
#   [include servo_calibration.cfg]
#
# Measurement macros home the axis if needed, wrap the strokes in a servo
# capture (.scap lands in ~/printer_data/logs/servo_captures/), and pace
# every stroke with M400 / G4 / M400 so each one replans from idle.
# Drive-parameter macros are thin wrappers over SERVO_PARAM with the A6-EC
# object addresses baked in (CXX.YY lives at 0x20XX.(0xYY+1)).

[gcode_macro _SERVO_STROKES]
description: Internal stroke engine - one accel/speed block of paced strokes
gcode:
  {% set axis = params.AXIS|default('X')|upper %}
  {% set start = params.START|float %}
  {% set end = params.END|float %}
  {% set speed = params.SPEED|float %}
  {% set accel = params.ACCEL|float %}
  {% set iterations = params.ITERATIONS|default(3)|int %}
  {% set dwell = params.DWELL_MS|default(700)|int %}
  {% if end <= start %}
    {action_raise_error("END=%.1f must exceed START=%.1f" % (end, start))}
  {% endif %}
  {% if speed * speed / accel > (end - start) %}
    {action_raise_error("stroke %.0fmm too short to reach %.0fmm/s at %.0fmm/s^2 (needs %.1fmm)"
      % (end - start, speed, accel, speed * speed / accel))}
  {% endif %}
  SET_VELOCITY_LIMIT ACCEL={accel} ACCEL_TO_DECEL={accel}
  G90
  {% for i in range(iterations) %}
    G1 {axis}{end} F{(speed * 60)|int}
    M400
    G4 P{dwell}
    M400
    G1 {axis}{start} F{(speed * 60)|int}
    M400
    G4 P{dwell}
    M400
  {% endfor %}

[gcode_macro _SERVO_CAL_PREP]
description: Internal - home if needed, settle before capture
gcode:
  {% set axis = params.AXIS|default('X')|upper %}
  {% if axis|lower not in printer.toolhead.homed_axes %}
    G28 {axis}
  {% endif %}
  M400
  G4 P{params.DWELL_MS|default(700)|int}
  M400

[gcode_macro _SERVO_CAL_RESTORE]
description: Internal - restore configured velocity limits
gcode:
  {% set cfg_accel = printer.configfile.settings.printer.max_accel %}
  SET_VELOCITY_LIMIT ACCEL={cfg_accel} ACCEL_TO_DECEL={printer.configfile.settings.printer.max_accel_to_decel|default(cfg_accel)}

[gcode_macro SERVO_MEASURE_TRACKING]
description: Single accel/speed stroke run with capture - the before/after check for any tuning change. Params AXIS START END SPEED ACCEL ITERATIONS DWELL_MS NAME
gcode:
  {% set axis = params.AXIS|default('X')|upper %}
  {% set start = params.START|default(20)|float %}
  {% set end = params.END|default(200)|float %}
  {% set speed = params.SPEED|default(100)|float %}
  {% set accel = params.ACCEL|default(3000)|float %}
  {% set iterations = params.ITERATIONS|default(3)|int %}
  {% set dwell = params.DWELL_MS|default(700)|int %}
  {% set name = params.NAME|default('track') %}
  _SERVO_CAL_PREP AXIS={axis} DWELL_MS={dwell}
  SERVO_CAPTURE_START NAME={name}
  _SERVO_STROKES AXIS={axis} START={start} END={end} SPEED={speed} ACCEL={accel} ITERATIONS={iterations} DWELL_MS={dwell}
  SERVO_CAPTURE_STOP
  _SERVO_CAL_RESTORE

[gcode_macro SERVO_MEASURE_INERTIA]
description: Excitation grid for the inertia/friction fit (servo-ident). Comma lists ACCELS and SPEEDS, plus AXIS START END ITERATIONS DWELL_MS NAME
gcode:
  {% set axis = params.AXIS|default('X')|upper %}
  {% set start = params.START|default(20)|float %}
  {% set end = params.END|default(200)|float %}
  {% set accels = params.ACCELS|default('800,1500,3000') %}
  {% set speeds = params.SPEEDS|default('50,100') %}
  {% set iterations = params.ITERATIONS|default(3)|int %}
  {% set dwell = params.DWELL_MS|default(700)|int %}
  {% set name = params.NAME|default('ident') %}
  _SERVO_CAL_PREP AXIS={axis} DWELL_MS={dwell}
  SERVO_CAPTURE_START NAME={name}
  {% for a in accels.split(',') %}
    {% for s in speeds.split(',') %}
      _SERVO_STROKES AXIS={axis} START={start} END={end} SPEED={s|trim} ACCEL={a|trim} ITERATIONS={iterations} DWELL_MS={dwell}
    {% endfor %}
  {% endfor %}
  SERVO_CAPTURE_STOP
  _SERVO_CAL_RESTORE

[gcode_macro SERVO_MEASURE_FRICTION]
description: Slow constant-speed sweeps for the torque-vs-position friction map. Params AXIS START END SPEED ACCEL ITERATIONS DWELL_MS NAME
gcode:
  {% set axis = params.AXIS|default('X')|upper %}
  {% set start = params.START|default(20)|float %}
  {% set end = params.END|default(200)|float %}
  {% set speed = params.SPEED|default(20)|float %}
  {% set accel = params.ACCEL|default(300)|float %}
  {% set iterations = params.ITERATIONS|default(2)|int %}
  {% set dwell = params.DWELL_MS|default(700)|int %}
  {% set name = params.NAME|default('friction') %}
  _SERVO_CAL_PREP AXIS={axis} DWELL_MS={dwell}
  SERVO_CAPTURE_START NAME={name}
  _SERVO_STROKES AXIS={axis} START={start} END={end} SPEED={speed} ACCEL={accel} ITERATIONS={iterations} DWELL_MS={dwell}
  SERVO_CAPTURE_STOP
  _SERVO_CAL_RESTORE

[gcode_macro SERVO_SHOW_TUNING]
description: Read back tuning mode, inertia ratio, gain set 1 and feedforward params from the drive. Param SERVO
gcode:
  {% set servo = params.SERVO|default('servo_x') %}
  RESPOND MSG="C00.04 auto-tuning mode (0=manual 1=stiffness table 2=positioning):"
  SERVO_PARAM SERVO={servo} GET=0x2000.0x05
  RESPOND MSG="C00.05 stiffness level (1..31, used in mode 1):"
  SERVO_PARAM SERVO={servo} GET=0x2000.0x06
  RESPOND MSG="C00.06 load inertia ratio (%):"
  SERVO_PARAM SERVO={servo} GET=0x2000.0x07
  RESPOND MSG="C01.00 position loop gain (0.1 rad/s):"
  SERVO_PARAM SERVO={servo} GET=0x2001.0x01
  RESPOND MSG="C01.01 speed loop gain (0.1 Hz):"
  SERVO_PARAM SERVO={servo} GET=0x2001.0x02
  RESPOND MSG="C01.02 speed integral time (0.01 ms):"
  SERVO_PARAM SERVO={servo} GET=0x2001.0x03
  RESPOND MSG="C01.13 velocity FF source / C01.14 pct (0.1%) / C01.15 filter (Hz):"
  SERVO_PARAM SERVO={servo} GET=0x2001.0x14
  SERVO_PARAM SERVO={servo} GET=0x2001.0x15
  SERVO_PARAM SERVO={servo} GET=0x2001.0x16
  RESPOND MSG="C01.16 torque FF source / C01.17 pct (0.1%) / C01.18 filter (Hz):"
  SERVO_PARAM SERVO={servo} GET=0x2001.0x17
  SERVO_PARAM SERVO={servo} GET=0x2001.0x18
  SERVO_PARAM SERVO={servo} GET=0x2001.0x19

[gcode_macro SERVO_SET_INERTIA_RATIO]
description: Write C00.06 load inertia ratio in percent (fit recommends 37; drive default 100). Params RATIO SERVO
gcode:
  {% set servo = params.SERVO|default('servo_x') %}
  {% set ratio = params.RATIO|int %}
  {% if not 0 <= ratio <= 12000 %}
    {action_raise_error("RATIO=%d outside C00.06 range 0..12000 (%%)" % ratio)}
  {% endif %}
  SERVO_PARAM SERVO={servo} SET=0x2000.0x07 VALUE={ratio} TYPE=u16

[gcode_macro SERVO_APPLY_GAINS]
description: Switch the drive to manual tuning (C00.04=0) and write gain set 1. POS_GAIN in 0.1 rad/s (400 = 40 rad/s), SPEED_GAIN in 0.1 Hz (250 = 25 Hz), INTEGRAL in 0.01 ms (3184 = 31.8 ms). Defaults are the factory Low preset. Param SERVO
gcode:
  {% set servo = params.SERVO|default('servo_x') %}
  {% set pos_gain = params.POS_GAIN|default(400)|int %}
  {% set speed_gain = params.SPEED_GAIN|default(250)|int %}
  {% set integral = params.INTEGRAL|default(3184)|int %}
  SERVO_PARAM SERVO={servo} SET=0x2000.0x05 VALUE=0 TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2001.0x01 VALUE={pos_gain} TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2001.0x02 VALUE={speed_gain} TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2001.0x03 VALUE={integral} TYPE=u16
  SERVO_SHOW_TUNING SERVO={servo}

[gcode_shell_command servo_gain_report]
command: ~/klippy-env/bin/python ~/kalico/scripts/servo_gain_report.py
timeout: 120
verbose: True

[gcode_macro SERVO_CALIBRATE_GAINS]
description: Gain sweep, shaper-calibrate style. Tests each speed-loop gain in SPEED_GAINS (0.1 Hz units, comma list), deriving position gain and integral from the vendor ratios; one capture per step; then renders a comparison PNG into ~/printer_data/config/servo_calibrate_results and prints a recommendation. Reverts to the first (lowest) gains afterwards. Params SPEED_GAINS AXIS START END SPEED ACCEL ITERATIONS DWELL_MS TAG SERVO
gcode:
  {% set servo = params.SERVO|default('servo_x') %}
  {% set axis = params.AXIS|default('X')|upper %}
  {% set start = params.START|default(20)|float %}
  {% set end = params.END|default(200)|float %}
  {% set speed = params.SPEED|default(100)|float %}
  {% set accel = params.ACCEL|default(3000)|float %}
  {% set iterations = params.ITERATIONS|default(2)|int %}
  {% set dwell = params.DWELL_MS|default(700)|int %}
  {% set tag = params.TAG|default('cal') %}
  {% set sgains = [] %}
  {% for s in (params.SPEED_GAINS|default('500,650,800,1000')).split(',') %}
    {% set sg = s|trim|int %}
    {% if not 100 <= sg <= 3000 %}
      {action_raise_error("SPEED_GAIN %d outside 100..3000 (0.1 Hz units)" % sg)}
    {% endif %}
    {% set _ = sgains.append(sg) %}
  {% endfor %}
  _SERVO_CAL_PREP AXIS={axis} DWELL_MS={dwell}
  SERVO_PARAM SERVO={servo} SET=0x2000.0x05 VALUE=0 TYPE=u16
  {% for sg in sgains %}
    {% set pg = (sg * 1.6)|round|int %}
    {% set ig = (1250000 / sg)|round|int %}
    RESPOND MSG="gain step {loop.index}/{sgains|length}: pos {pg/10} rad/s, speed {sg/10} Hz, Ti {ig/100} ms"
    SERVO_PARAM SERVO={servo} SET=0x2001.0x01 VALUE={pg} TYPE=u16
    SERVO_PARAM SERVO={servo} SET=0x2001.0x02 VALUE={sg} TYPE=u16
    SERVO_PARAM SERVO={servo} SET=0x2001.0x03 VALUE={ig} TYPE=u16
    SERVO_CAPTURE_START NAME={tag}_p{pg}_s{sg}_i{ig}
    _SERVO_STROKES AXIS={axis} START={start} END={end} SPEED={speed} ACCEL={accel} ITERATIONS={iterations} DWELL_MS={dwell}
    SERVO_CAPTURE_STOP
  {% endfor %}
  {% set sg0 = sgains[0] %}
  RESPOND MSG="sweep done - reverting to first step ({sg0/10} Hz) until you apply the recommendation"
  SERVO_PARAM SERVO={servo} SET=0x2001.0x01 VALUE={(sg0 * 1.6)|round|int} TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2001.0x02 VALUE={sg0} TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2001.0x03 VALUE={(1250000 / sg0)|round|int} TYPE=u16
  _SERVO_CAL_RESTORE
  RUN_SHELL_COMMAND CMD=servo_gain_report PARAMS="--tag {tag}"

[gcode_macro SERVO_SET_STIFFNESS]
description: Vendor-table tuning path - switch to standard mode (C00.04=1) and set C00.05 stiffness level 1..31 (factory 12). The drive derives all gain-set-1 values from the level. Params LEVEL SERVO
gcode:
  {% set servo = params.SERVO|default('servo_x') %}
  {% set level = params.LEVEL|int %}
  {% if not 1 <= level <= 31 %}
    {action_raise_error("LEVEL=%d outside C00.05 range 1..31" % level)}
  {% endif %}
  SERVO_PARAM SERVO={servo} SET=0x2000.0x05 VALUE=1 TYPE=u16
  SERVO_PARAM SERVO={servo} SET=0x2000.0x06 VALUE={level} TYPE=u16
  SERVO_SHOW_TUNING SERVO={servo}
