[gcode_macro PRINT_START]
#   Use PRINT_START for the slicer starting script - please customise for your slicer of choice
gcode:
    {% set bedtemp = params.BED|int %}
    {% set hotendtemp = params.EXTRUDER|int %}
    {% set chambertemp = params.CHAMBER|default(0)|int %}
    G90 ; use absolute coordinates
    M83 ; extruder relative mode
    #SKEW_PROFILE LOAD=CaliFlower
    CLEAR_PAUSE
    RESET_VELOCITY_LIMIT
    BED_MESH_CLEAR
    SET_GCODE_OFFSET Z=0
      
    SET_HEATER_TEMPERATURE HEATER=heater_bed TARGET={bedtemp}
    {% if chambertemp != 0 %}
      SET_HEATER_TEMPERATURE HEATER=chamber TARGET={chambertemp}
    {% endif %}
    
    M106 S150
    TEMPERATURE_WAIT SENSOR=extruder MAXIMUM=165
    M106 S0


    M104 S160 ; hotend 180c

    {% if chambertemp != 0 %}
      TEMPERATURE_WAIT SENSOR="heater_generic chamber" MINIMUM={chambertemp|int - 5}
    {% endif %}
   

    TEMPERATURE_WAIT SENSOR=heater_bed MINIMUM={bedtemp}
    TEMPERATURE_WAIT SENSOR=extruder MINIMUM=150
    G28     ; home axes
    G0 Z2   ; position beacon at 2mm for heat soak

    G4 P15000       ; optional, let temps settle for 1 min
    SYNC_MOTORS

    #M106 S0 ; disable fan after heatsoak
    ;G28 Z ; home z only 

    G28 Z METHOD=CONTACT CALIBRATE=1    ; calibrate z offset and beacon model hot
    Z_TILT_ADJUST                       ; or QGL to balance towers
    BED_MESH_CALIBRATE ADAPTIVE=1 RUNS=2           ; bed mesh in scan mode
    BED_MESH_CHECK MAX_DEVIATION=0.3

    G28 Z METHOD=CONTACT CALIBRATE=0    ; calibrate z offset only after tilt/mesh
    G92 E0
    G1 Z20 F3000                   ; move nozzle away from bed
    SET_GCODE_OFFSET Z=0.16
    M104 S{hotendtemp} ; set final nozzle temp

    TEMPERATURE_WAIT SENSOR=extruder MINIMUM={hotendtemp|int - 1} 
    M117 Purge Line
    M83                                                 ; extruder to relative mode
    G92 E0                                              ; Reset extruder
    LINE_PURGE
    SET_PIN PIN=caselight VALUE=0.9
    G92 E0
    #M400		                                ; clear buffer
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=1
   

[gcode_macro PRINT_END]
#   Use PRINT_END for the slicer ending script - please customise for your slicer of choice
gcode:
    # safe anti-stringing move coords
    {% set th = printer.toolhead %}
    {% set x_safe = th.position.x + 20 * (1 if th.axis_maximum.x - th.position.x > 20 else -1) %}
    {% set y_safe = th.position.y + 20 * (1 if th.axis_maximum.y - th.position.y > 20 else -1) %}
    {% set z_safe = [th.position.z + 2, th.axis_maximum.z]|min %}
    
    SAVE_GCODE_STATE NAME=STATE_PRINT_END
    
    M400                           ; wait for buffer to clear
    G92 E0                         ; zero the extruder
    G1 E-10.0 F1800                 ; retract filament
    
    TURN_OFF_HEATERS
    
    G90                                      ; absolute positioning
    G0 X{x_safe} Y{y_safe} Z{z_safe} F60000  ; move nozzle to remove stringing
    G0 X{th.axis_maximum.x//2} Y{th.axis_maximum.y - 50} F30000  ; park nozzle at rear
    M107                                     ; turn off fan
    
    #BED_MESH_CLEAR
    RESTORE_GCODE_STATE NAME=STATE_PRINT_END
    SET_PIN PIN=caselight VALUE=0.1
    SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0
    #SET_SKEW CLEAR=1
    M84                            ; turn steppers off

[gcode_macro RESONANCE_Y_CYCLE]
gcode:
  G28
  MOTORS_SYNC
  GENERATE_SHAPER_GRAPHS axis=y
  M84

[gcode_macro RESONANCE_X_CYCLE]
gcode:
  G28
  MOTORS_SYNC
  GENERATE_SHAPER_GRAPHS axis=x
  M84

[gcode_macro RESONANCE_BOTH_CYCLE]
gcode:
  G28
  MOTORS_SYNC
  GENERATE_SHAPER_GRAPHS
  M84


[gcode_macro _CLIENT_VARIABLE]
variable_use_custom_pos   : True  # use custom park coordinates for x,y [True/False]
variable_custom_park_x    : 150   # custom x position; value must be within your defined min and max of X
variable_custom_park_y    : 60   # custom y position; value must be within your defined min and max of Y
variable_custom_park_dz   : 2.0   # custom dz value; the value in mm to lift the nozzle when move to park position
variable_retract          : 1.0   # the value to retract while PAUSE
variable_cancel_retract   : 5.0   # the value to retract while CANCEL_PRINT
variable_speed_retract    : 35.0  # retract speed in mm/s
variable_unretract        : 1.0   # the value to unretract while RESUME
variable_speed_unretract  : 35.0  # unretract speed in mm/s
variable_speed_hop        : 15.0  # z move speed in mm/s
variable_speed_move       : 300.0 # move speed in mm/s
variable_park_at_cancel   : False # allow to move the toolhead to park while execute CANCEL_PRINT [True/False]
#variable_park_at_cancel_x : None  # different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
#variable_park_at_cancel_y : None  # different park position during CANCEL_PRINT [None/Position as Float]; park_at_cancel must be True
# !!! Caution [firmware_retraction] must be defined in the printer.cfg if you set use_fw_retract: True !!!
variable_use_fw_retract   : True # use fw_retraction instead of the manual version [True/False]
variable_idle_timeout     : 0     # time in sec until idle_timeout kicks in. Value 0 means that no value will be set or restored
#variable_runout_sensor    : ""    # If a sensor is defined, it will be used to cancel the execution of RESUME in case no filament is detected.
#                                   Specify the config name of the runout sensor e.g "filament_switch_sensor runout". Hint use the same as in your printer.cfg
# !!! Custom macros, please use with care and review the section of the corresponding macro.
# These macros are for simple operations like setting a status LED. Please make sure your macro does not interfere with the basic macro functions.
# Only  single line commands are supported, please create a macro if you need more than one command.
#variable_user_pause_macro : ""    # Everything inside the "" will be executed after the klipper base pause (PAUSE_BASE) function
#variable_user_resume_macro: ""    # Everything inside the "" will be executed before the klipper base resume (RESUME_BASE) function
variable_user_cancel_macro: "SET_FILAMENT_SENSOR SENSOR=encoder_sensor ENABLE=0"
gcode:
