# Synthetic printer.cfg for klippy-in-loop sim tests.
#
# Talks to a Linux-host klipper.elf binary built from MACH_LINUX +
# KALICO_RUNTIME, exercising the full bridge → runtime path without
# real hardware. NEVER use on a physical printer — pins map to whatever
# the host's gpiochip0 happens to expose; some lines on a Pi 5 (HDMI,
# PMIC, etc.) shouldn't be toggled.

[mcu]
serial: /tmp/klipper_sim_socket

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000

# X — corexy stepper A. Pins are unused inputs on Pi 5 gpiochip0 (safe
# to drive as outputs in this sim host). The endstop pin gets sampled
# by kalico_endstop_sample_pins; we drive its level via the
# kalico_sim_endstop_set_pin shim from the test driver.
[stepper_x]
step_pin: gpiochip0/gpio9
dir_pin: gpiochip0/gpio10
enable_pin: !gpiochip0/gpio11
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpiochip0/gpio20
position_endstop: 0
position_max: 200
homing_speed: 50

[stepper_y]
step_pin: gpiochip0/gpio12
dir_pin: gpiochip0/gpio13
enable_pin: !gpiochip0/gpio14
microsteps: 16
rotation_distance: 40
endstop_pin: ^gpiochip0/gpio21
position_endstop: 0
position_max: 200
homing_speed: 50

[stepper_z]
step_pin: gpiochip0/gpio15
dir_pin: gpiochip0/gpio16
enable_pin: !gpiochip0/gpio17
microsteps: 16
rotation_distance: 8
endstop_pin: ^gpiochip0/gpio22
position_endstop: 0
position_max: 200
homing_speed: 5

# No [extruder] — MotionToolhead falls back to DummyExtruder which is
# enough for movement-only tests. Adding a real extruder would force a
# heater + ADC sensor which Linux klipper can't open in the host build.

# Shaping disabled in sim — the C¹ Hermite refit can't hit tolerance on
# the synthetic test moves. Real printers will run with shaping enabled;
# this is purely to keep Phase 4 step-pulse verification independent of
# the shaper-fit pipeline. Tracked as a separate trajectory-crate fix.
[input_shaper]
shaper_freq_x: 0
shaper_type_x: smooth_zv
shaper_freq_y: 0
shaper_type_y: smooth_zv

# Enables SET_KINEMATIC_POSITION so sim tests can fake-home without G28.
[force_move]
enable_force_move: True
