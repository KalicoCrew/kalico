# Auto-generated by writing-plans Task 2.3, extended for Task 7.2.
# Maps real-hardware pin/bus/serial names to sim equivalents.
# All STM32 pin names appearing anywhere under printer_real/config/ are
# remapped onto gpiochip0/gpioN, where N is unique per real pin. The
# Linux MCU's gpio.c accepts this synthetic chip path; chip routing for
# specific buses (SPI / TMCUART) is handled separately by the runtime
# auto-route in spidev.c / tmcuart.c.

[mcu_main.gpio]
PA2 = "gpiochip0/gpio0"
PB11 = "gpiochip0/gpio1"
