# Minimal printer.cfg for homing-lag reproduction in Renode.
# GPIO endstops (not sensorless) with retract + min_home_dist to exercise
# the _mcu_pending_end_time overshoot bug.

[mcu]
serial: socket://localhost:3334

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000

[stepper_x]
step_pin: PA0
dir_pin: PA1
enable_pin: !PA3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA4
position_endstop: 20
position_max: 20
homing_speed: 50
homing_retract_dist: 5
min_home_dist: 15

[stepper_y]
step_pin: PA5
dir_pin: PA6
enable_pin: !PA7
microsteps: 16
rotation_distance: 40
endstop_pin: ^PB0
position_endstop: 0
position_max: 200
homing_speed: 50

[stepper_z]
step_pin: PB1
dir_pin: PB2
enable_pin: !PB3
microsteps: 16
rotation_distance: 8
endstop_pin: ^PB4
position_endstop: 0
position_max: 200
homing_speed: 5

[force_move]
enable_force_move: True
