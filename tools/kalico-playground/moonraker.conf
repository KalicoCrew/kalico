# Moonraker config for the playground (containerized, no systemd).
[server]
host: 0.0.0.0
port: 7125
klippy_uds_address: /printer_data/klippy.sock

[machine]
# No systemd/dbus in the container.
provider: none

[authorization]
# Permissive — this is a local, port-mapped playground only.
cors_domains:
  *
trusted_clients:
  0.0.0.0/0
  ::/0

[file_manager]
enable_object_processing: False

[octoprint_compat]

[history]
