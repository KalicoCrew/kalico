name: Rust runtime (Step 5 + Step 6)

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      rust: ${{ steps.filter.outputs.rust }}
      headers: ${{ steps.filter.outputs.headers }}
      klipper-c: ${{ steps.filter.outputs.klipper-c }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v2
        id: filter
        with:
          filters: |
            rust:
              - 'rust/**'
              - 'Cargo.lock'
              - '.github/workflows/ci-rust-runtime.yaml'
            headers:
              - 'rust/**'
              - 'tools/regen_headers.sh'
              - '.github/workflows/ci-rust-runtime.yaml'
            klipper-c:
              - 'src/**'
              - '.github/workflows/ci-rust-runtime.yaml'

  rust-host:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: cargo build (workspace; covers kalico-host-rt + runtime + temporal)
        run: cargo build --workspace
      - name: cargo test (workspace; covers kalico-host-rt + runtime + temporal)
        # `--features test-injection` activates the runtime crate's
        # `Engine::inject_iter_count` predicate path that gates
        # `tests/max_boundary_iters.rs` (Phase 12.2). Without it the
        # integration test compiles to an empty binary via `#![cfg(...)]`
        # and the §6.6 ABI-cap regression would silently never run in CI.
        run: cargo test --workspace --features runtime/test-injection
      - name: cargo clippy (-D warnings)
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo fmt (check)
        run: cargo fmt --all -- --check

  # Step-6 §11.4 / §11.3 loom tests for half-split SPSC, widened-clock
  # seqlock, force_idle handshake, and curve-pool alloc race. Loom
  # exhaustively explores the model-checked thread interleavings; it
  # only runs when --cfg loom is set (see runtime/Cargo.toml).
  rust-loom:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust
    env:
      RUSTFLAGS: "--cfg loom"
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: loom
      - name: cargo test (loom — runtime, --release)
        run: >
          cargo test -p runtime --release
          --test loom_seqlock
          --test loom_spsc_split
          --test loom_force_idle
          --test loom_curve_pool_alloc

  rust-mcu-h7:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: mcu-h7
      - name: cargo build (mcu-h7)
        # Include motion-module-stepper to match what the Makefile/Kconfig
        # produce for real firmware; without it the dispatch-less MCU build
        # fires the compile_error guard added in lib.rs fix #3.
        # KALICO_RUNTIME_* are mandatory on bare-metal targets (build.rs panics
        # otherwise); the real firmware build gets them from Kconfig via the
        # Makefile. For this staticlib compile-check the H7 pair is a
        # self-consistent value set that compiles for any arch.
        run: >
          KALICO_RUNTIME_STORAGE_SIZE=122880 KALICO_RUNTIME_PIECE_RING_SIZE=63488
          cargo build -p kalico-c-api --no-default-features
          --features mcu-h7,header-nurbs,header-runtime,motion-module-stepper
          --target thumbv7em-none-eabi

  rust-mcu-f4:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: mcu-f4
      - name: cargo build (mcu-f4)
        # Include motion-module-stepper to match what the Makefile/Kconfig
        # produce for real firmware; without it the dispatch-less MCU build
        # fires the compile_error guard added in lib.rs fix #3.
        run: >
          KALICO_RUNTIME_STORAGE_SIZE=122880 KALICO_RUNTIME_PIECE_RING_SIZE=63488
          cargo build -p kalico-c-api --no-default-features
          --features mcu-f4,header-nurbs,header-runtime,motion-module-stepper
          --target thumbv7em-none-eabi

  rust-mcu-g0:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv6m-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: mcu-g0
      - name: cargo build (mcu-g0)
        # G0 (Cortex-M0+, thumbv6m). CI never compiled mcu-g0 at all, and the
        # runtime_tick_g0.c FFI-drift bug was G0-only — this closes the Rust-side
        # gap. The full C link per arch is covered by ci-mcu-firmware.yaml.
        run: >
          KALICO_RUNTIME_STORAGE_SIZE=122880 KALICO_RUNTIME_PIECE_RING_SIZE=63488
          cargo build -p kalico-c-api --no-default-features
          --features mcu-g0,header-nurbs,header-runtime,motion-module-stepper
          --target thumbv6m-none-eabi

  # Validate the EtherCAT servo-node / no-stepper compile path: runtime built
  # with --no-default-features --features host omits motion-module-stepper, so
  # the compile_error guard in lib.rs must NOT fire (host builds are valid
  # without a dispatch module). Also confirms fix #2: the two dispatch_stepper
  # test files are fully suppressed by their #![cfg(feature = "motion-module-stepper")].
  rust-no-stepper:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libudev-dev
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: no-stepper
      - name: cargo build (runtime, no-stepper servo-node path)
        run: >
          cargo build -p runtime --no-default-features --features host
      - name: cargo test --no-run (runtime, no-stepper — compile gate)
        run: >
          cargo test -p runtime --no-default-features --features host --no-run

  rust-cbindgen-drift:
    needs: changes
    if: needs.changes.outputs.headers == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: cbindgen-drift
      - name: Regenerate headers
        run: ./tools/regen_headers.sh
      - name: Verify headers committed in tree match generated
        run: git diff --exit-code rust/kalico-c-api/include/

  rust-c-smoke:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: c-smoke
      - name: Build release staticlib
        run: >
          cargo build -p kalico-c-api --no-default-features
          --features host,header-nurbs,header-runtime --release
      - name: Run c_smoke_build test
        run: >
          cargo test -p kalico-c-api --no-default-features
          --features host,header-nurbs,header-runtime
          --test c_smoke_build

  rust-deny:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: rust/Cargo.toml

  rust-miri:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@nightly
        with:
          components: miri
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: miri
      - name: cargo +nightly miri test (runtime, host)
        env:
          MIRIFLAGS: "-Zmiri-ignore-leaks"
        run: >
          cargo +nightly miri test -p runtime --features host
          --test curve_pool_alloc
          --test engine_underrun
          --test fault_encoding
          --test force_idle_short_circuit
          --test hold_segment
          --test max_boundary_iters
          --test reclaim_pipeline
          --test segment_id_atomics
          --test seqlock_unit
          --test trace_overflow

  rust-panic-symbol-grep:
    needs: changes
    if: needs.changes.outputs.rust == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    # Informational until the nurbs Layer 0 panic-elimination pass lands.
    # The de Boor evaluator currently relies on mathematically-proved loop
    # invariants for knot/cp indexing, which LLVM cannot see — bounds checks
    # survive the release build. Tracked as a Layer 0 follow-up; the gate
    # still reports diffs to the job log so regressions stay visible.
    continue-on-error: true
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: thumbv7em-none-eabi
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
          key: panic-grep
      - name: Emit LLVM-IR for release MCU build
        run: >
          cargo rustc -p kalico-c-api --release
          --no-default-features --features mcu-h7,header-nurbs,header-runtime
          --target thumbv7em-none-eabi -- --emit=llvm-ir
      - name: Grep for panic symbols
        shell: bash
        run: |
          set -eo pipefail
          shopt -s nullglob
          ll_files=(target/thumbv7em-none-eabi/release/deps/*.ll)
          if [ ${#ll_files[@]} -eq 0 ]; then
            echo "No LLVM-IR files emitted; build step likely failed silently"
            exit 1
          fi
          if grep -E 'core::panicking|panic_bounds_check' "${ll_files[@]}"; then
            echo "Panic symbols found in MCU build — review src/runtime/src/*.rs for bounds-check or division-by-zero paths"
            exit 1
          fi
          echo "No panic symbols detected in release MCU build."

  watchdog-canary:
    needs: changes
    if: needs.changes.outputs.klipper-c == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - name: Assert kalico_liveness_ok gate present
        run: grep -F 'kalico_liveness_ok' src/stm32/watchdog.c
      - name: Assert CONFIG_KALICO_RUNTIME gate present
        run: grep -F 'CONFIG_KALICO_RUNTIME' src/stm32/watchdog.c
