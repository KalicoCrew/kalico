[quad_gantry_level]
gantry_corners:
    -60, -10
    360, 370
speed: 250
horizontal_move_z: 15
min_horizontal_move_z: 1.0
retries: 10
retry_tolerance: 0.0075
max_adjust: 10
adaptive_horizontal_move_z: True
use_probe_xy_offsets: True

[axis_twist_compensation]

