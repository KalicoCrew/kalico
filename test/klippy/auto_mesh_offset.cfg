# Test config for auto mesh bounds calculation
[mcu]
serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00

[printer]
kinematics: corexy
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

bed_size: 300.0, 300.0
bed_corner_position: -4.3, -10.8
#margin: 30.0, 30.0
#preserve_aspect_ratio: True

[stepper_x]
# B Stepper - Back Left
step_pin: PF13
dir_pin: !PF12
enable_pin: !PF14
microsteps: 32
rotation_distance: 40
endstop_pin: PG6
position_endstop: -5
position_min: -5
position_max: 300
homing_speed: 60
homing_positive_dir: False

[stepper_y]
# A Stepper - Back Right
step_pin: PF9
dir_pin: !PF10
enable_pin: !PG2
microsteps: 32
rotation_distance: 40
endstop_pin: PG9
position_endstop: -5
position_min: -5
position_max: 305
homing_speed: 60
homing_positive_dir: False

[stepper_z]
# Z0 Stepper - Front Left - M1
step_pin: PG0
dir_pin: !PG1
enable_pin: !PF15
rotation_distance: 40
gear_ratio: 80:16
endstop_pin: probe:z_virtual_endstop
position_max: 280
position_min: -20
microsteps: 16

[stepper_z1]
# Z1 Stepper - Rear Left - M5
step_pin: PC13
dir_pin: PF0
enable_pin: !PF1
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[stepper_z2]
# Z2 Stepper - Rear Right - M7
step_pin: PE6
dir_pin: !PA14
enable_pin: !PE0
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[stepper_z3]
# Z2 Stepper - Front Right - M3
step_pin: PG4
dir_pin: PC1
enable_pin: !PA2
rotation_distance: 40
gear_ratio: 80:16
microsteps: 16

[extruder]
step_pin: PA4
dir_pin: PA6
enable_pin: !PA2
microsteps: 16
rotation_distance: 33.5
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PB4
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF4
control: pid
pid_Kp: 22.2
pid_Ki: 1.08
pid_Kd: 114
min_temp: 0
max_temp: 250

[heater_bed]
heater_pin: PA1
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PF3
control: watermark
min_temp: 0
max_temp: 130

[bltouch]
sensor_pin: PC7
control_pin: PC5
z_offset: 1.15
y_offset: 22.0
x_offset: 0.0
min_edge_distance: 30

[bed_mesh]
zero_reference_position: 150, 150
horizontal_move_z: 3
probe_count: 10, 10
algorithm: bicubic

[safe_z_home]

