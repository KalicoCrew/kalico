# rust/deny.toml — cargo-deny policy for Step-5 dependency graph.
# Spec §6.6 quality gate; supply-chain audit on heapless + transitive deps.
# Schema for cargo-deny ≥0.16 (pre-0.16 used `vulnerability=`, `copyleft=`,
# `default=` keys which are now deprecated; we use the current allow-list shape).

[advisories]
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/RustSec/advisory-db"]
yanked = "deny"
ignore = [
    # time RFC-2822 *parsing* stack exhaustion. Unreachable here: the only
    # `time` usage in the workspace is motion-bridge/src/logging/{schema,layer}.rs
    # — OffsetDateTime::now_utc() + compile-time format_description! FORMATTING
    # of JSONL timestamps. Nothing parses with `time`, RFC-2822 or otherwise.
    # The fixed release (0.3.47) requires rustc 1.88; the workspace toolchain
    # is pinned at 1.85 (rust-toolchain.toml), so we stay on 0.3.45 and ignore.
    # Drop this entry when the toolchain pin moves to >= 1.88.
    { id = "RUSTSEC-2026-0009", reason = "time used for formatting only; RFC-2822 parse path unreachable; fix requires rustc 1.88 > pinned 1.85" },
]

[licenses]
# Allow-list approach — anything not listed is denied by default in current
# cargo-deny. The kalico Rust crates can ship under permissive licenses
# (MIT/Apache-2.0); GPL-compat is preserved at the link-line level when
# compiled into Klipper (Klipper itself is GPLv3, and permissive Rust deps
# are GPL-compatible per the GNU GPL FAQ).
allow = [
    "MIT", "Apache-2.0", "Apache-2.0 WITH LLVM-exception",
    "BSD-3-Clause", "ISC", "Unicode-DFS-2016", "Unicode-3.0", "Zlib",
]

# Per-crate exceptions for licenses that are otherwise denied. cbindgen is a
# build-time-only dep (header generation under the `host` feature); MPL-2.0
# applies to the cbindgen source files we run, not to the staticlib we ship.
[[licenses.exceptions]]
crate = "cbindgen"
allow = ["MPL-2.0"]

[[licenses.exceptions]]
crate = "serialport"
allow = ["MPL-2.0"]

[bans]
multiple-versions = "warn"
deny = []   # extend as crate-specific rejections surface

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
