# macOS: allow Python extension cdylibs to leave Python symbols unresolved at
# link time.  Python's dlopen will satisfy them when it loads the .so at
# runtime.  Without this flag the static linker rejects _Py_* symbols as
# "undefined".  This flag is a no-op on non-Darwin hosts.
[target.aarch64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

[target.x86_64-apple-darwin]
rustflags = ["-C", "link-arg=-undefined", "-C", "link-arg=dynamic_lookup"]

# Klipper's H7 build uses soft-float ABI (no -mfloat-abi=hard in CFLAGS),
# so the kalico staticlib must match or the linker rejects archive merge
# with "uses VFP register arguments, klipper.elf does not". Use the
# soft-ABI target. Step 6 (phase stepping) may revisit and switch the
# whole H7 firmware to hard-float if the cycle budget demands it.
[target.thumbv7em-none-eabi]
rustflags = [
    "-C", "target-cpu=cortex-m7",
    # No `+strict-align`: it forces compiler_builtins to emit byte-by-byte
    # memcpy/memset that get linked as weak symbols and override libgcc's
    # word-aligned versions for the entire firmware, including Klipper's
    # USB stack. Cortex-M7 permits unaligned word/halfword access by default
    # (CCR.UNALIGN_TRP=0 at reset) so the standard fast copies are correct.
    "-C", "link-arg=--nmagic",
]
