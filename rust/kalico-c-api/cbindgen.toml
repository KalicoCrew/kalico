language = "C"
header = """\
/*\n\
 * kalico_nurbs.h — generated by cbindgen.\n\
 * DO NOT EDIT. Regenerate via `cargo run -p kalico-c-api --bin gen-headers`.\n\
 * See docs/superpowers/specs/2026-04-26-nurbs-evaluation-library-design.md.\n\
 */\n"""

include_guard = "KALICO_NURBS_H"
pragma_once = true
no_includes = false

[export]
prefix = "kalico_nurbs_"
# Runtime FFI symbols and types live in `src/runtime_ffi.rs` of the same
# crate. cbindgen scans the binding crate's whole module tree regardless of
# `parse.include`, and stable-toolchain mode prevents the cleaner cfg-gating
# via `parse.expand` (needs nightly `-Zunpretty=expanded`). Filter at the
# export level so this header carries only the nurbs surface.
exclude = [
    "KalicoRuntime",
    "TraceSample",
    "runtime_handle_create",
    "runtime_handle_push_segment",
    "runtime_handle_load_curve_cubic",
    "runtime_handle_status",
    "runtime_handle_last_error",
    "runtime_handle_tick_counter",
    "runtime_tick_enable",
    "runtime_tick_disable",
    "runtime_cyccnt_read",
    "runtime_clock_freq",
]

[fn]
sort_by = "Name"

[parse]
parse_deps = true
include = ["nurbs"]
